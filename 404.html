<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Загрузка…</title>
  <script>
    // ------------------------------------------------------------------
    // Зачем нужен этот файл
    // ------------------------------------------------------------------
    // GitHub Pages — это просто хранилище статичных файлов. Он ничего не
    // знает про наш JS-роутинг и про адреса вида /works или /cases/dom —
    // для него это просто "несуществующие файлы". Поэтому при прямом
    // переходе по такой ссылке (или при обновлении страницы, F5) сервер
    // не находит файл works.html и показывает именно эту страницу —
    // 404.html.
    //
    // Мы используем это: вместо обычной страницы "ошибка 404" мы
    // на лету запоминаем, какой адрес хотел открыть пользователь,
    // и отправляем его на index.html, передав этот адрес в параметре
    // ?redirect=... . Сам index.html (см. самый первый <script> в
    // его <head>) прочитает этот параметр и восстановит нужный адрес
    // через history.replaceState — без перезагрузки и без "моргания".
    //
    // Если сайт переедет в корень домена — поменяйте basePath на ''.
    // ------------------------------------------------------------------
    var basePath = '/Personal-Website';
    var loc = window.location;
    var pathAfterBase = loc.pathname.slice(basePath.length); // например "/works"

    loc.replace(
      basePath + '/?redirect=' + encodeURIComponent(pathAfterBase + loc.search + loc.hash)
    );
  </script>
</head>
<body></body>
</html>
